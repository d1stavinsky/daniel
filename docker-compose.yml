services:
  app:
    container_name: axis-partner-dashboard
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://ensura.co.il}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS}
    # App stays on the Docker network only — Caddy terminates TLS publicly.
    expose:
      - "3000"
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      - ensura
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2.9-alpine
    container_name: ensura-caddy
    restart: unless-stopped
    ports:
      # Bind explicitly to all interfaces (not loopback-only).
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@ensura.co.il}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - ensura
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  ensura:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
