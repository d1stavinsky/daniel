name: Deploy to production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy AXIS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 185.241.4.184
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /root/axis-app
            git pull --ff-only origin main

            # Keep Better Auth / app URL aligned with the public domain users open.
            # Prefer HTTPS when TLS is terminated in front of the app; fall back to HTTP.
            PUBLIC_APP_URL="${PUBLIC_APP_URL:-http://ensura.co.il}"
            if grep -q '^NEXT_PUBLIC_APP_URL=' .env.production; then
              sed -i "s|^NEXT_PUBLIC_APP_URL=.*|NEXT_PUBLIC_APP_URL=${PUBLIC_APP_URL}|" .env.production
            else
              echo "NEXT_PUBLIC_APP_URL=${PUBLIC_APP_URL}" >> .env.production
            fi
            if grep -q '^BETTER_AUTH_URL=' .env.production; then
              sed -i "s|^BETTER_AUTH_URL=.*|BETTER_AUTH_URL=${PUBLIC_APP_URL}|" .env.production
            else
              echo "BETTER_AUTH_URL=${PUBLIC_APP_URL}" >> .env.production
            fi
            if grep -q '^AUTH_TRUSTED_ORIGINS=' .env.production; then
              sed -i 's|^AUTH_TRUSTED_ORIGINS=.*|AUTH_TRUSTED_ORIGINS=http://ensura.co.il,https://ensura.co.il,http://www.ensura.co.il,https://www.ensura.co.il,http://185.241.4.184|' .env.production
            else
              echo 'AUTH_TRUSTED_ORIGINS=http://ensura.co.il,https://ensura.co.il,http://www.ensura.co.il,https://www.ensura.co.il,http://185.241.4.184' >> .env.production
            fi

            # Ensure auth secret exists — Better Auth hard-fails without it.
            if ! grep -qE '^BETTER_AUTH_SECRET=.+' .env.production; then
              echo "BETTER_AUTH_SECRET=$(openssl rand -base64 32)" >> .env.production
              echo "Generated missing BETTER_AUTH_SECRET"
            fi

            docker compose --env-file .env.production pull
            docker compose --env-file .env.production up -d --build --remove-orphans
            docker compose ps

            # Ensure the first admin exists (idempotent).
            if [ -n "${ADMIN_BOOTSTRAP_PASSWORD:-}" ]; then
              docker compose --env-file .env.production run --rm --no-deps \
                -e ADMIN_EMAIL="${ADMIN_EMAIL:-admin@axis.co.il}" \
                -e ADMIN_NAME="${ADMIN_NAME:-ENSURA Admin}" \
                -e ADMIN_PASSWORD="$ADMIN_BOOTSTRAP_PASSWORD" \
                --entrypoint node app -e '
                  console.log("admin bootstrap skipped in slim image — use /setup or host script");
                ' || true
            fi
