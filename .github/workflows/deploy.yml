name: Deploy to production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy AXIS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
        with:
          host: 185.241.4.184
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 25m
          envs: DATABASE_URL,BETTER_AUTH_SECRET
          script: |
            set -euo pipefail
            cd /root/axis-app
            git pull --ff-only origin main
            touch .env.production
            chmod 600 .env.production

            upsert_env() {
              local key="$1"
              local value="$2"
              local tmp
              if [ -z "$value" ]; then
                return 0
              fi
              tmp="$(mktemp)"
              # Never use sed with secret/URL values — `/` and `&` corrupt the file.
              if [ -f .env.production ]; then
                grep -v "^${key}=" .env.production > "$tmp" || true
              else
                : > "$tmp"
              fi
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
              mv "$tmp" .env.production
              chmod 600 .env.production
            }

            PUBLIC_APP_URL="${PUBLIC_APP_URL:-http://ensura.co.il}"
            upsert_env NEXT_PUBLIC_APP_URL "$PUBLIC_APP_URL"
            upsert_env BETTER_AUTH_URL "$PUBLIC_APP_URL"
            upsert_env AUTH_TRUSTED_ORIGINS "http://ensura.co.il,https://ensura.co.il,http://www.ensura.co.il,https://www.ensura.co.il,http://185.241.4.184"

            # Sync required secrets from GitHub Actions when configured.
            if [ -n "${DATABASE_URL:-}" ]; then
              upsert_env DATABASE_URL "$DATABASE_URL"
              echo "Synced DATABASE_URL from GitHub secret"
            fi

            if [ -n "${BETTER_AUTH_SECRET:-}" ] && [ "${#BETTER_AUTH_SECRET}" -ge 32 ]; then
              upsert_env BETTER_AUTH_SECRET "$BETTER_AUTH_SECRET"
              echo "Synced BETTER_AUTH_SECRET from GitHub secret"
            else
              current="$(grep '^BETTER_AUTH_SECRET=' .env.production 2>/dev/null | head -1 | cut -d= -f2- || true)"
              if [ -z "$current" ] || [ "${#current}" -lt 32 ]; then
                upsert_env BETTER_AUTH_SECRET "$(openssl rand -base64 32)"
                echo "Generated strong BETTER_AUTH_SECRET (was missing/too short)"
              fi
            fi

            if ! grep -qE '^DATABASE_URL=.+' .env.production; then
              echo "ERROR: DATABASE_URL is missing in .env.production — set GitHub secret DATABASE_URL"
              exit 1
            fi

            docker compose --env-file .env.production pull
            docker compose --env-file .env.production up -d --build --remove-orphans
            docker compose ps
